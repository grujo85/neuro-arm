<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="utf-8">
    <title>NASA NEURO-ARM v3.5</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root { 
            --nasa-red: #FC3D21; 
            --nasa-white: #F4F4F4; /* Mat bela za telo */
            --nasa-dark: #111111;  /* Crna za zglobove */
            --bg: #050507; 
        }
        
        body { margin: 0; background: var(--bg); color: #eee; font-family: 'Courier New', Courier, monospace; display: flex; height: 100vh; overflow: hidden; flex-direction: row; }
        
        /* Default za Desktop */
        #ui { 
            width: 280px; 
            padding: 25px; 
            background: rgba(10, 10, 12, 0.95); 
            border-right: 2px solid #333; 
            z-index: 100; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.5); 
            display: flex;
            flex-direction: column;
        }
        
        #container { flex-grow: 1; position: relative; }
        
        h2 { font-size: 18px; margin-top: 0; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 15px; color: var(--nasa-white); }
        h2 span { color: var(--nasa-red); font-weight: bold; }

        .slider-box { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-size: 11px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; color: #aaa; }
        
        /* Veći klizači za touch */
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--nasa-red); height: 15px; }
        
        .val { float: right; color: var(--nasa-red); background: #000; padding: 2px 8px; border-radius: 4px; border: 1px solid #222; font-weight: bold;}

        /* Mobilni Media Query */
        @media (max-width: 768px) {
            body { flex-direction: column-reverse; } /* UI ide dole */
            
            #ui { 
                width: 100%; 
                height: auto; 
                padding: 15px; 
                border-right: none; 
                border-top: 2px solid #333; 
                box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
                box-sizing: border-box;
            }
            
            h2 { font-size: 16px; margin-bottom: 15px; padding-bottom: 10px; text-align: center;}
            
            .slider-group {
                display: flex;
                justify-content: space-around;
                gap: 10px;
            }
            
            .slider-box { 
                margin-bottom: 0; 
                flex: 1; 
                text-align: center;
            }
            
            label { font-size: 10px; margin-bottom: 5px; }
            .val { float: none; display: inline-block; margin-top: 2px; font-size: 10px;}
        }
    </style>
</head>
<body>

<div id="ui">
    <h2>NASA NEURO-ARM <span>v3.5</span></h2>
    <div class="slider-group">
        <div class="slider-box">
            <label>Baza <span id="v1" class="val">0</span></label>
            <input type="range" id="j1" min="-180" max="180" value="0">
        </div>
        <div class="slider-box">
            <label>Rame <span id="v2" class="val">-45</span></label>
            <input type="range" id="j2" min="-90" max="45" value="-45">
        </div>
        <div class="slider-box">
            <label>Lakat <span id="v3" class="val">90</span></label>
            <input type="range" id="j3" min="0" max="150" value="90">
        </div>
    </div>
</div>

<div id="container"></div>

<script>
    let scene, camera, renderer, controls;
    let base, shoulder, elbow, forearm;

    function init() {
        const container = document.getElementById('container');
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050507);
        // Dodavanje blage magle za dubinu
        scene.fog = new THREE.Fog(0x050507, 10, 50);
        
        camera = new THREE.PerspectiveCamera(50, container.clientWidth/container.clientHeight, 0.1, 1000);
        // Prilagođavanje kamere za mobilni (malo dalje)
        const isMobile = window.innerWidth <= 768;
        camera.position.set(isMobile ? 16 : 12, isMobile ? 12 : 10, isMobile ? 20 : 15);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minDistance = 5;
        controls.maxDistance = 40;

        // Osvetljenje
        scene.add(new THREE.AmbientLight(0xaaaaaa, 1.5)); // Jače ambijentalno svetlo za belu boju
        const dLight = new THREE.DirectionalLight(0xffffff, 1);
        dLight.position.set(10, 20, 15);
        scene.add(dLight);
        
        // Mreža (Grid) - tamnija
        const grid = new THREE.GridHelper(30, 30, 0x333333, 0x111111);
        grid.position.y = -0.1;
        scene.add(grid);

        // MATERIJALI (NASA)
        const whiteMat = new THREE.MeshStandardMaterial({ 
            color: 0xF4F4F4, // NASA Bela
            metalness: 0.1, 
            roughness: 0.5, // Mat finiš
        });
        
        const darkMat = new THREE.MeshStandardMaterial({ 
            color: 0x111111, // Crna za zglobove
            metalness: 0.5, 
            roughness: 0.2 
        });

        const logoMat = new THREE.MeshBasicMaterial({ color: 0xFC3D21 }); // NASA Crvena

        // MODEL ROBOTA
        base = new THREE.Group();
        scene.add(base);
        // Baza je tamna
        const baseMesh = new THREE.Mesh(new THREE.CylinderGeometry(1.6, 2, 0.8, 32), darkMat);
        base.add(baseMesh);

        shoulder = new THREE.Group();
        shoulder.position.y = 0.6;
        base.add(shoulder);
        // Rame je crno
        shoulder.add(new THREE.Mesh(new THREE.SphereGeometry(0.8, 32, 32), darkMat));

        const arm1 = new THREE.Group();
        shoulder.add(arm1);
        // Prva ruka je bela
        const p1 = new THREE.Mesh(new THREE.BoxGeometry(0.8, 4, 0.8), whiteMat);
        p1.position.y = 2;
        arm1.add(p1);

        // --- NASA LOGO (Osnovni oblici) na arm1 ---
        const logoGroup = new THREE.Group();
        logoGroup.position.set(0, 2, 0.41); // Na prednjoj strani ruke
        arm1.add(logoGroup);
        
        // Crveni krug (osnova)
        const logoBack = new THREE.Mesh(new THREE.CircleGeometry(0.25, 32), logoMat);
        logoGroup.add(logoBack);
        
        // Bela "V" traka (kao stilizovano krilo)
        const vWing1 = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.3, 0.01), new THREE.MeshBasicMaterial({color: 0xffffff}));
        vWing1.rotation.z = -Math.PI / 4;
        vWing1.position.set(-0.05, 0, 0.01);
        logoGroup.add(vWing1);
        
        const vWing2 = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.3, 0.01), new THREE.MeshBasicMaterial({color: 0xffffff}));
        vWing2.rotation.z = Math.PI / 4;
        vWing2.position.set(0.05, 0, 0.01);
        logoGroup.add(vWing2);
        // ------------------------------------------

        elbow = new THREE.Group();
        elbow.position.y = 4;
        arm1.add(elbow);
        // Lakat je crn
        const p2 = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 1.2, 16), darkMat);
        p2.rotation.z = Math.PI/2;
        elbow.add(p2);

        forearm = new THREE.Group();
        elbow.add(forearm);
        // Podlaktica je bela
        const p3 = new THREE.Mesh(new THREE.BoxGeometry(0.6, 3, 0.6), whiteMat);
        p3.position.y = 1.5;
        forearm.add(p3);

        // Crveni detalj na kraju (kao alat)
        const tool = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.4, 0.5, 16), logoMat);
        tool.position.y = 3;
        forearm.add(tool);

        // Početna poza
        arm1.rotation.z = -0.8;
        forearm.rotation.z = 1.5;

        // Resizing
        window.addEventListener('resize', onWindowResize);
        animate();
    }

    function onWindowResize() {
        const container = document.getElementById('container');
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    // Input handlers
    document.querySelectorAll('input').forEach(input => {
        input.oninput = function() {
            const val = parseFloat(this.value);
            document.getElementById('v' + this.id.slice(1)).innerText = val;
            const rad = val * (Math.PI/180);
            if(this.id === 'j1') base.rotation.y = rad;
            if(this.id === 'j2') shoulder.children[1].rotation.z = rad; // Rotira arm1 unutar shoulder-a
            if(this.id === 'j3') forearm.rotation.z = rad;
        };
    });

    init();
</script>
</body>
</html>
