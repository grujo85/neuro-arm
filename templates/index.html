<!DOCTYPE html>
<html>
<head>
    <title>RESCUE MODE - ROBOT</title>
    <style>
        body { background: #111; color: #0f0; font-family: monospace; display: flex; }
        #ui { width: 250px; padding: 20px; border-right: 1px solid #0f0; }
        #screen { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; height: 100vh; }
        .block { position: absolute; border: 2px solid #0f0; transition: 0.1s; }
        #base_v { width: 100px; height: 20px; background: #222; bottom: 50px; }
        #arm1_v { width: 20px; height: 150px; background: #333; bottom: 70px; transform-origin: bottom center; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>ROBO_RESCUE</h2>
        <label>BASE</label><br>
        <input type="range" id="j1" min="-100" max="100" value="0"><br><br>
        <label>ARM</label><br>
        <input type="range" id="j2" min="-90" max="90" value="0">
        <p id="msg">Status: Čekam komandu...</p>
    </div>
    <div id="screen">
        <div id="base_v" class="block">
            <div id="arm1_v" class="block"></div>
        </div>
    </div>

    <script>
        const j1 = document.getElementById('j1');
        const j2 = document.getElementById('j2');
        const base = document.getElementById('base_v');
        const arm = document.getElementById('arm1_v');

        j1.oninput = () => {
            base.style.left = (50 + parseInt(j1.value)) + "%";
            document.getElementById('msg').innerText = "Pomeram bazu...";
        };

        j2.oninput = () => {
            arm.style.transform = `rotate(${j2.value}deg)`;
            document.getElementById('msg').innerText = "Rotiram ruku...";
        };
    </script>
</body>
</html>
