<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="utf-8">
    <title>ROBOT ARM V3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root { --cyan: #00f5ff; --dark: #0f1115; }
        body { margin: 0; background: var(--dark); color: #eee; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #ui { width: 260px; padding: 20px; background: rgba(20, 25, 35, 0.95); border-right: 1px solid #333; z-index: 100; }
        #container { flex-grow: 1; position: relative; }
        .slider-box { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 11px; color: #888; text-transform: uppercase; }
        input[type=range] { width: 100%; accent-color: var(--cyan); cursor: pointer; }
        .val { float: right; color: var(--cyan); font-family: monospace; }
        
        @media (max-width: 768px) {
            body { flex-direction: column-reverse; }
            #ui { width: 100%; height: auto; border-right: none; border-top: 1px solid #333; padding: 15px; box-sizing: border-box; }
            .slider-group { display: flex; gap: 10px; }
            .slider-box { flex: 1; margin: 0; }
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="slider-group">
        <div class="slider-box">
            <label>Baza <span id="v1" class="val">0</span></label>
            <input type="range" id="j1" min="-180" max="180" value="0">
        </div>
        <div class="slider-box">
            <label>Rame <span id="v2" class="val">-45</span></label>
            <input type="range" id="j2" min="-90" max="45" value="-45">
        </div>
        <div class="slider-box">
            <label>Lakat <span id="v3" class="val">90</span></label>
            <input type="range" id="j3" min="0" max="150" value="90">
        </div>
    </div>
</div>

<div id="container"></div>

<script>
    let scene, camera, renderer, controls, base, shoulder, elbow, forearm;

    function init() {
        const container = document.getElementById('container');
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f1115);
        
        camera = new THREE.PerspectiveCamera(50, container.clientWidth/container.clientHeight, 0.1, 1000);
        camera.position.set(12, 10, 15);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0x404040, 2));
        const grid = new THREE.GridHelper(30, 30, 0x00f5ff, 0x222222);
        scene.add(grid);

        const metalMat = new THREE.MeshStandardMaterial({ color: 0x2a2d33, metalness: 0.8, roughness: 0.2 });
        const cyanMat = new THREE.MeshStandardMaterial({ color: 0x00f5ff, emissive: 0x00f5ff, emissiveIntensity: 0.4 });

        base = new THREE.Group();
        scene.add(base);
        base.add(new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.8, 0.6, 32), metalMat));

        shoulder = new THREE.Group();
        shoulder.position.y = 0.5;
        base.add(shoulder);
        shoulder.add(new THREE.Mesh(new THREE.SphereGeometry(0.7, 32, 32), cyanMat));

        const arm1 = new THREE.Group();
        shoulder.add(arm1);
        arm1.add(new THREE.Mesh(new THREE.BoxGeometry(0.7, 4, 0.7), metalMat));
        arm1.children[0].position.y = 2;

        elbow = new THREE.Group();
        elbow.position.y = 4;
        arm1.add(elbow);
        const joint2 = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1, 16), cyanMat);
        joint2.rotation.z = Math.PI/2;
        elbow.add(joint2);

        forearm = new THREE.Group();
        elbow.add(forearm);
        forearm.add(new THREE.Mesh(new THREE.BoxGeometry(0.5, 3, 0.5), metalMat));
        forearm.children[0].position.y = 1.5;

        arm1.rotation.z = -0.8;
        forearm.rotation.z = 1.5;

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    document.querySelectorAll('input').forEach(input => {
        input.oninput = function() {
            const val = parseFloat(this.value);
            document.getElementById('v' + this.id.slice(1)).innerText = val;
            const rad = val * (Math.PI/180);
            if(this.id === 'j1') base.rotation.y = rad;
            if(this.id === 'j2') shoulder.rotation.z = rad;
            if(this.id === 'j3') forearm.rotation.z = rad;
        };
    });

    init();
</script>
</body>
</html>
