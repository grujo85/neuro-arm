<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="utf-8">
    <title>NASA NEURO-ARM v3.6</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root { 
            --turquoise: #00f5ff; /* Tirkizna boja */
            --nasa-white: #ffffff; 
            --bg: #f0f2f5; /* Veoma svetla siva */
            --ui-bg: rgba(255, 255, 255, 0.95);
        }
        
        body { margin: 0; background: var(--bg); color: #333; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; flex-direction: row; }
        
        #ui { 
            width: 280px; padding: 25px; background: var(--ui-bg); 
            border-right: 1px solid #ddd; z-index: 100; display: flex; flex-direction: column; 
        }
        
        #container { flex-grow: 1; position: relative; }
        
        h2 { font-size: 18px; margin-top: 0; margin-bottom: 30px; color: #111; border-bottom: 2px solid var(--turquoise); padding-bottom: 10px; }
        h2 span { color: var(--turquoise); }

        .slider-box { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #666; }
        
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--turquoise); height: 12px; }
        .val { float: right; color: var(--turquoise); background: #222; padding: 2px 8px; border-radius: 4px; font-weight: bold; }

        @media (max-width: 768px) {
            body { flex-direction: column-reverse; }
            #ui { width: 100%; border-right: none; border-top: 1px solid #ddd; padding: 15px; }
            .slider-group { display: flex; gap: 10px; }
            .slider-box { flex: 1; margin-bottom: 0; }
            h2 { font-size: 16px; margin-bottom: 15px; text-align: center; }
        }
    </style>
</head>
<body>

<div id="ui">
    <h2>NASA <span>NEURO-ARM</span></h2>
    <div class="slider-group">
        <div class="slider-box">
            <label>Baza <span id="v1" class="val">0</span></label>
            <input type="range" id="j1" min="-180" max="180" value="0">
        </div>
        <div class="slider-box">
            <label>Rame <span id="v2" class="val">-45</span></label>
            <input type="range" id="j2" min="-90" max="45" value="-45">
        </div>
        <div class="slider-box">
            <label>Lakat <span id="v3" class="val">90</span></label>
            <input type="range" id="j3" min="0" max="150" value="90">
        </div>
    </div>
</div>

<div id="container"></div>

<script>
    let scene, camera, renderer, controls, base, shoulder, elbow, forearm;

    function init() {
        const container = document.getElementById('container');
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f2f5);
        scene.fog = new THREE.Fog(0xf0f2f5, 15, 50);
        
        camera = new THREE.PerspectiveCamera(50, container.clientWidth/container.clientHeight, 0.1, 1000);
        const isMobile = window.innerWidth <= 768;
        camera.position.set(isMobile ? 18 : 12, 12, isMobile ? 22 : 15);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Svetlo
        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const dLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dLight.position.set(10, 20, 10);
        scene.add(dLight);

        // Mreža (Grid) - tirkizna
        const grid = new THREE.GridHelper(30, 30, 0x00f5ff, 0xdddddd);
        grid.position.y = -0.1;
        scene.add(grid);

        // Materijali
        const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.1, roughness: 0.4 });
        const darkMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.2 });
        const turquoiseMat = new THREE.MeshBasicMaterial({ color: 0x00f5ff });

        // Model
        base = new THREE.Group();
        scene.add(base);
        base.add(new THREE.Mesh(new THREE.CylinderGeometry(1.6, 2, 0.6, 32), darkMat));

        shoulder = new THREE.Group();
        shoulder.position.y = 0.5;
        base.add(shoulder);
        shoulder.add(new THREE.Mesh(new THREE.SphereGeometry(0.7, 32, 32), darkMat));

        const arm1 = new THREE.Group();
        shoulder.add(arm1);
        arm1.add(new THREE.Mesh(new THREE.BoxGeometry(0.7, 4, 0.7), whiteMat));
        arm1.children[0].position.y = 2;

        elbow = new THREE.Group();
        elbow.position.y = 4;
        arm1.add(elbow);
        const joint2 = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1, 16), turquoiseMat);
        joint2.rotation.z = Math.PI/2;
        elbow.add(joint2);

        forearm = new THREE.Group();
        elbow.add(forearm);
        forearm.add(new THREE.Mesh(new THREE.BoxGeometry(0.5, 3, 0.5), whiteMat));
        forearm.children[0].position.y = 1.5;

        // Tirkizni detalji na ruci
        const glowStrip = new THREE.Mesh(new THREE.BoxGeometry(0.55, 1.5, 0.1), turquoiseMat);
        glowStrip.position.set(0, 1.5, 0.26);
        forearm.add(glowStrip);

        arm1.rotation.z = -0.8;
        forearm.rotation.z = 1.5;

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    document.querySelectorAll('input').forEach(input => {
        input.oninput = function() {
            const val = parseFloat(this.value);
            document.getElementById('v' + this.id.slice(1)).innerText = val;
            const rad = val * (Math.PI/180);
            if(this.id === 'j1') base.rotation.y = rad;
            if(this.id === 'j2') shoulder.rotation.z = rad;
            if(this.id === 'j3') forearm.rotation.z = rad;
        };
    });

    init();
</script>
</body>
</html>
