<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="utf-8">
    <title>NEURO-ARM PRO v3.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #0a0b10; }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #ui { width: 280px; padding: 25px; background: rgba(15, 17, 26, 0.98); border-right: 2px solid var(--neon); z-index: 100; box-shadow: 10px 0 30px rgba(0,0,0,0.8); }
        #container { flex-grow: 1; position: relative; }
        .slider-box { margin-bottom: 30px; }
        label { display: block; margin-bottom: 10px; font-size: 11px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--neon); height: 4px; }
        .val { float: right; color: #fff; background: #1a1a1a; padding: 2px 8px; border-radius: 4px; border: 1px solid #333; }
        h2 { font-size: 20px; margin-top: 0; margin-bottom: 40px; border-bottom: 1px solid #333; padding-bottom: 15px; text-shadow: 0 0 10px var(--neon); }
    </style>
</head>
<body>

<div id="ui">
    <h2>NEURO-ARM <span style="color:#fff">3.0</span></h2>
    <div class="slider-box">
        <label>Baza <span id="v1" class="val">0</span></label>
        <input type="range" id="j1" min="-180" max="180" value="0">
    </div>
    <div class="slider-box">
        <label>Rame <span id="v2" class="val">-45</span></label>
        <input type="range" id="j2" min="-90" max="45" value="-45">
    </div>
    <div class="slider-box">
        <label>Lakat <span id="v3" class="val">90</span></label>
        <input type="range" id="j3" min="0" max="150" value="90">
    </div>
</div>

<div id="container"></div>

<script>
    let scene, camera, renderer, controls;
    let base, shoulder, elbow, forearm;

    function init() {
        const container = document.getElementById('container');
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0b10);
        
        camera = new THREE.PerspectiveCamera(50, container.clientWidth/container.clientHeight, 0.1, 1000);
        camera.position.set(12, 10, 15);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0x404040, 2));
        const pLight = new THREE.PointLight(0x00f2ff, 2, 100);
        pLight.position.set(10, 15, 10);
        scene.add(pLight);
        scene.add(new THREE.GridHelper(30, 30, 0x00f2ff, 0x111111));

        const metalMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9, roughness: 0.1 });
        const glowMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff });

        // MODEL ROBOTA
        base = new THREE.Group();
        scene.add(base);
        base.add(new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.8, 0.6, 32), metalMat));

        shoulder = new THREE.Group();
        shoulder.position.y = 0.5;
        base.add(shoulder);
        shoulder.add(new THREE.Mesh(new THREE.SphereGeometry(0.7, 32, 32), metalMat));

        const arm1 = new THREE.Group();
        shoulder.add(arm1);
        const p1 = new THREE.Mesh(new THREE.BoxGeometry(0.7, 4, 0.7), metalMat);
        p1.position.y = 2;
        arm1.add(p1);

        elbow = new THREE.Group();
        elbow.position.y = 4;
        arm1.add(elbow);
        const p2 = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1, 16), metalMat);
        p2.rotation.z = Math.PI/2;
        elbow.add(p2);

        forearm = new THREE.Group();
        elbow.add(forearm);
        const p3 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 3, 0.5), metalMat);
        p3.position.y = 1.5;
        forearm.add(p3);

        const neon = new THREE.Mesh(new THREE.BoxGeometry(0.12, 2, 0.52), glowMat);
        neon.position.set(0.3, 1.5, 0);
        forearm.add(neon);

        // Početna poza
        arm1.rotation.z = -0.8;
        forearm.rotation.z = 1.5;

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    document.querySelectorAll('input').forEach(input => {
        input.oninput = function() {
            const val = parseFloat(this.value);
            document.getElementById('v' + this.id.slice(1)).innerText = val;
            const rad = val * (Math.PI/180);
            if(this.id === 'j1') base.rotation.y = rad;
            if(this.id === 'j2') shoulder.children[1].rotation.z = rad;
            if(this.id === 'j3') forearm.rotation.z = rad;
        };
    });

    init();
</script>
</body>
</html>
